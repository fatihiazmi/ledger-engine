<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger Engine</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242836;
            --border: #2e3345;
            --text: #e4e6f0;
            --text-dim: #8b8fa3;
            --accent: #6c63ff;
            --accent-hover: #7f78ff;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Layout */
        .app { max-width: 1200px; margin: 0 auto; padding: 24px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        header h1 span { color: var(--accent); }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status { font-size: 13px; color: var(--text-dim); }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .grid-full { grid-column: 1 / -1; }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover { background: var(--accent-hover); }

        .btn-sm { padding: 6px 12px; font-size: 12px; }

        .btn-ghost {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover { border-color: var(--accent); }

        /* Account List */
        .account-list { display: flex; flex-direction: column; gap: 8px; }

        .account-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--surface2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .account-row:hover { border-left: 3px solid var(--accent); padding-left: 13px; }
        .account-row.selected { border-left: 3px solid var(--accent); padding-left: 13px; background: #1e2235; }

        .account-name { font-weight: 500; font-size: 14px; }
        .account-type { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

        .account-balance {
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .balance-positive { color: var(--green); }
        .balance-negative { color: var(--red); }
        .balance-zero { color: var(--text-dim); }

        /* Transaction History */
        .txn-table { width: 100%; border-collapse: collapse; }

        .txn-table th {
            text-align: left;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        .txn-table td {
            padding: 10px 12px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            font-variant-numeric: tabular-nums;
        }

        .txn-table tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-debit { background: rgba(239, 68, 68, 0.15); color: var(--red); }
        .badge-credit { background: rgba(34, 197, 94, 0.15); color: var(--green); }

        /* Forms / Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 440px;
            max-width: 90vw;
        }

        .modal h2 { font-size: 18px; margin-bottom: 20px; }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-size: 14px;
        }

        /* Stats */
        .stats { display: flex; gap: 16px; margin-bottom: 24px; }

        .stat-card {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
        }

        .stat-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .stats { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1><span>Ledger</span> Engine</h1>
            <div class="status"><span class="status-dot"></span>Connected</div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Accounts</div>
                <div class="stat-value" id="stat-accounts">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Assets</div>
                <div class="stat-value" id="stat-assets">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Transactions</div>
                <div class="stat-value" id="stat-transactions">0</div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Accounts</span>
                    <div>
                        <button class="btn btn-sm btn-ghost" onclick="openDepositModal()">Add Funds</button>
                        <button class="btn btn-sm btn-ghost" onclick="openTransferModal()">Transfer</button>
                        <button class="btn btn-sm btn-primary" onclick="openAccountModal()">+ Account</button>
                    </div>
                </div>
                <div class="account-list" id="account-list">
                    <div class="empty-state">No accounts yet</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Transaction History</span>
                    <span id="history-account-name" style="font-size:13px; color:var(--accent);"></span>
                </div>
                <div id="transaction-history">
                    <div class="empty-state">Select an account to view transactions</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Account Modal -->
    <div class="modal-overlay hidden" id="account-modal">
        <div class="modal">
            <h2>Open New Account</h2>
            <div class="form-group">
                <label>Account Name</label>
                <input type="text" id="acc-name" placeholder="e.g. Savings Account">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="acc-type">
                    <option value="ASSET">Asset (Checking/Savings)</option>
                    <option value="EQUITY">Equity (Capital)</option>
                    <option value="LIABILITY">Liability</option>
                </select>
            </div>
            <div class="form-group">
                <label>Currency</label>
                <select id="acc-currency">
                    <option value="USD">USD</option>
                    <option value="MYR">MYR</option>
                    <option value="SGD">SGD</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
                <button class="btn btn-primary" onclick="createAccount()">Create Account</button>
            </div>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div class="modal-overlay hidden" id="deposit-modal">
        <div class="modal">
            <h2>Add Funds</h2>
            <div class="form-group">
                <label>Account</label>
                <select id="dep-account"></select>
            </div>
            <div class="form-group">
                <label>Amount ($)</label>
                <input type="number" id="dep-amount" placeholder="0.00" step="0.01" min="0.01">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="dep-desc" placeholder="e.g. Payroll deposit">
            </div>
            <div class="form-actions">
                <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
                <button class="btn btn-primary" onclick="deposit()">Deposit</button>
            </div>
        </div>
    </div>

    <!-- Transfer Modal -->
    <div class="modal-overlay hidden" id="transfer-modal">
        <div class="modal">
            <h2>Record Transaction</h2>
            <div class="form-group">
                <label>From Account (Debit)</label>
                <select id="txn-from"></select>
            </div>
            <div class="form-group">
                <label>To Account (Credit)</label>
                <select id="txn-to"></select>
            </div>
            <div class="form-group">
                <label>Amount ($)</label>
                <input type="number" id="txn-amount" placeholder="0.00" step="0.01" min="0.01">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="txn-desc" placeholder="e.g. Monthly rent">
            </div>
            <div class="form-actions">
                <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
                <button class="btn btn-primary" onclick="recordTransaction()">Record</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api/v1';
        let accounts = [];
        let selectedAccountId = null;

        // --- API Calls ---
        async function fetchAccounts() {
            const res = await fetch(`${API}/accounts`);
            accounts = await res.json();
            renderAccounts();
            renderStats();
        }

        async function fetchHistory(accountId) {
            const res = await fetch(`${API}/accounts/${accountId}/transactions`);
            const history = await res.json();
            renderHistory(history);
        }

        async function createAccount() {
            const name = document.getElementById('acc-name').value.trim();
            const type = document.getElementById('acc-type').value;
            const currency = document.getElementById('acc-currency').value;

            if (!name) return alert('Name is required');

            await fetch(`${API}/accounts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, account_type: type, currency })
            });

            closeModals();
            document.getElementById('acc-name').value = '';
            fetchAccounts();
        }

        async function deposit() {
            const accountId = document.getElementById('dep-account').value;
            const dollars = parseFloat(document.getElementById('dep-amount').value);
            const desc = document.getElementById('dep-desc').value.trim();

            if (!accountId || !dollars) return alert('Fill all fields');

            const acc = accounts.find(a => a.account_id === accountId);

            const res = await fetch(`${API}/deposit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    account_id: accountId,
                    amount: dollars,
                    currency: acc?.currency || 'USD',
                    description: desc || 'Deposit'
                })
            });

            if (!res.ok) {
                const err = await res.json();
                return alert('Error: ' + err.error);
            }

            closeModals();
            document.getElementById('dep-amount').value = '';
            document.getElementById('dep-desc').value = '';
            fetchAccounts();
            if (selectedAccountId) fetchHistory(selectedAccountId);
        }

        async function recordTransaction() {
            const fromId = document.getElementById('txn-from').value;
            const toId = document.getElementById('txn-to').value;
            const dollars = parseFloat(document.getElementById('txn-amount').value);
            const desc = document.getElementById('txn-desc').value.trim();

            if (!fromId || !toId || !dollars || fromId === toId) {
                return alert('Fill all fields. From and To must be different.');
            }

            const amount = Math.round(dollars * 100); // dollars to cents
            const fromAcc = accounts.find(a => a.account_id === fromId);
            const currency = fromAcc?.currency || 'USD';

            const res = await fetch(`${API}/transactions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    entries: [
                        { account_id: fromId, amount, currency, type: 'DEBIT' },
                        { account_id: toId, amount, currency, type: 'CREDIT' }
                    ],
                    description: desc || 'Transfer'
                })
            });

            if (!res.ok) {
                const err = await res.json();
                return alert('Error: ' + err.error);
            }

            closeModals();
            document.getElementById('txn-amount').value = '';
            document.getElementById('txn-desc').value = '';
            fetchAccounts();
            if (selectedAccountId) fetchHistory(selectedAccountId);
        }

        // --- Rendering ---
        function formatMoney(cents, currency = 'USD') {
            const dollars = cents / 100;
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: currency,
                minimumFractionDigits: 2
            }).format(dollars);
        }

        function renderAccounts() {
            const list = document.getElementById('account-list');
            if (accounts.length === 0) {
                list.innerHTML = '<div class="empty-state">No accounts yet</div>';
                return;
            }

            list.innerHTML = accounts.map(acc => {
                const balClass = acc.balance > 0 ? 'balance-positive' : acc.balance < 0 ? 'balance-negative' : 'balance-zero';
                const selected = acc.account_id === selectedAccountId ? 'selected' : '';
                return `
                    <div class="account-row ${selected}" onclick="selectAccount('${acc.account_id}')">
                        <div>
                            <div class="account-name">${acc.name}</div>
                            <div class="account-type">${acc.account_type} &middot; ${acc.currency}</div>
                        </div>
                        <div class="account-balance ${balClass}">${formatMoney(acc.balance, acc.currency)}</div>
                    </div>
                `;
            }).join('');
        }

        function renderHistory(history) {
            const container = document.getElementById('transaction-history');
            if (history.length === 0) {
                container.innerHTML = '<div class="empty-state">No transactions yet</div>';
                return;
            }

            container.innerHTML = `
                <table class="txn-table">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Balance After</th>
                            <th>Description</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${history.map(tx => {
                            const badge = tx.entry_type === 'CREDIT' ? 'badge-credit' : 'badge-debit';
                            const sign = tx.entry_type === 'CREDIT' ? '+' : '-';
                            const date = new Date(tx.created_at).toLocaleDateString('en-US', {
                                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                            });
                            return `
                                <tr>
                                    <td><span class="badge ${badge}">${tx.entry_type}</span></td>
                                    <td>${sign}${formatMoney(tx.amount, tx.currency)}</td>
                                    <td>${formatMoney(tx.balance_after, tx.currency)}</td>
                                    <td>${tx.description}</td>
                                    <td style="color:var(--text-dim)">${date}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderStats() {
            document.getElementById('stat-accounts').textContent = accounts.length;

            const totalAssets = accounts
                .filter(a => a.account_type === 'ASSET')
                .reduce((sum, a) => sum + a.balance, 0);
            document.getElementById('stat-assets').textContent = formatMoney(totalAssets);

            const totalTxns = accounts.reduce((sum, a) => sum + (a.version - 1), 0);
            document.getElementById('stat-transactions').textContent = totalTxns;
        }

        // --- Interactions ---
        function selectAccount(id) {
            selectedAccountId = id;
            const acc = accounts.find(a => a.account_id === id);
            document.getElementById('history-account-name').textContent = acc?.name || '';
            renderAccounts();
            fetchHistory(id);
        }

        function openAccountModal() {
            document.getElementById('account-modal').classList.remove('hidden');
        }

        function openDepositModal() {
            const modal = document.getElementById('deposit-modal');
            const select = document.getElementById('dep-account');
            const assetAccounts = accounts.filter(a => a.account_type === 'ASSET');

            if (assetAccounts.length === 0) return alert('Create an asset account first');

            select.innerHTML = assetAccounts.map(a =>
                `<option value="${a.account_id}">${a.name} (${formatMoney(a.balance, a.currency)})</option>`
            ).join('');

            modal.classList.remove('hidden');
        }

        function openTransferModal() {
            const modal = document.getElementById('transfer-modal');
            const fromSelect = document.getElementById('txn-from');
            const toSelect = document.getElementById('txn-to');

            const options = accounts.map(a =>
                `<option value="${a.account_id}">${a.name} (${formatMoney(a.balance, a.currency)})</option>`
            ).join('');

            fromSelect.innerHTML = options;
            toSelect.innerHTML = options;

            modal.classList.remove('hidden');
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
        }

        // Close modal on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', e => {
                if (e.target === overlay) closeModals();
            });
        });

        // --- Init ---
        fetchAccounts();
        setInterval(fetchAccounts, 5000); // refresh every 5s
    </script>
</body>
</html>
